dataset:
  header_path: "data/raw/ngafid/all_flights/flight_header.csv"
  data_path: "data/raw/ngafid/all_flights/one_parq"
  size_ratio: 0.5        # fraction of flights to sample
  debug: false
  seed: 42

model:
  type: "conv_mhsa"             # cnn | conv_mhsa
  window_size: 512
  stride: 128
  max_timesteps: 4096
  cnn:
    filters: [64, 128, 256]
    kernel_size: 3
    dropout: 0.3
  conv_mhsa:
    embed_dim: 64
    num_heads: 4
    num_layers: 2
    conv_kernel: 5
    dropout: 0.1

training:
  batch_size: 64
  epochs: 5
  lr: 1e-4
  patience: 5
  class_weighting: true
  oversampling: true
  device: "cuda"
  seed: 142

task:
  horizon_steps: 300
  output: "risk_score"

paths:
  checkpoints: "outputs/models"
  logs: "outputs/logs"
  results: "outputs/results"
